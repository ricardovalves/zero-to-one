<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Expense — FairSplit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0',
              400: '#34d399', 500: '#10b981', 600: '#059669',
              700: '#047857', 800: '#065f46', 900: '#064e3b',
            }
          },
          fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    .tabular-nums { font-variant-numeric: tabular-nums; }
    input:focus, select:focus { outline: none; }
    .field-input:focus {
      border-color: #047857;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.25);
    }
    .field-input.error {
      border-color: #f43f5e;
      box-shadow: 0 0 0 3px rgba(244,63,94,0.2);
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }
    .shake { animation: shake 0.3s ease; }
    .slide-down { animation: slideDown 0.2s ease forwards; }
    @keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 400px; } }
    /* Split preview animate in */
    #split-preview { transition: opacity 0.2s ease, transform 0.2s ease; }
    #split-preview.hidden-preview { opacity: 0; transform: translateY(-4px); pointer-events: none; }
    /* Amount input large style */
    #amount-input {
      font-size: 2rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    /* Custom radio style */
    .split-radio:checked + label {
      background-color: #ecfdf5;
      border-color: #047857;
      color: #065f46;
    }
    .split-radio:checked + label .radio-dot {
      background-color: #047857;
      border-color: #047857;
    }
    /* Bottom safe area */
    .sticky-cta { padding-bottom: env(safe-area-inset-bottom, 0px); }
    /* Dropdown */
    .custom-select {
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 16 16' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M4 6l4 4 4-4' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
    }
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="h-full bg-slate-50 font-sans antialiased">

  <!-- Header -->
  <header class="bg-white border-b border-slate-100 sticky top-0 z-40">
    <div class="max-w-lg mx-auto px-4 h-14 flex items-center justify-between">
      <a href="./dashboard.html"
         class="inline-flex items-center gap-1.5 text-sm text-slate-600 font-medium hover:text-slate-900 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-500 rounded-lg px-1 py-1"
         aria-label="Cancel and go back to dashboard">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M11.25 4.5L6.75 9l4.5 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Cancel
      </a>
      <h1 class="text-base font-semibold text-slate-800">Add Expense</h1>
      <div class="w-16"></div><!-- Spacer -->
    </div>
  </header>

  <!-- Scrollable form content -->
  <main class="max-w-lg mx-auto px-4 pt-6 pb-28 fade-in">

    <form id="expense-form" novalidate onsubmit="handleSubmit(event)">

      <!-- Amount — hero field -->
      <div class="mb-6">
        <label for="amount-input" class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Amount</label>
        <div class="flex items-center gap-0 bg-white border border-slate-200 rounded-2xl px-5 py-4 focus-within:border-brand-700 focus-within:ring-3 focus-within:ring-brand-500/25 transition-all duration-150">
          <span class="text-3xl font-bold text-slate-400 mr-2 select-none" aria-hidden="true">$</span>
          <input
            id="amount-input"
            type="text"
            inputmode="decimal"
            placeholder="0.00"
            maxlength="10"
            autocomplete="off"
            aria-label="Expense amount in dollars"
            aria-required="true"
            aria-describedby="amount-error"
            oninput="handleAmountChange(this)"
            class="flex-1 bg-transparent text-slate-800 placeholder-slate-300 min-w-0 focus:outline-none"
          >
        </div>
        <p id="amount-error" class="hidden mt-1.5 text-xs text-rose-600 flex items-center gap-1" role="alert" aria-live="polite">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><circle cx="6" cy="6" r="5" stroke="#f43f5e" stroke-width="1.5"/><path d="M6 3.5V6.5M6 8h.01" stroke="#f43f5e" stroke-width="1.5" stroke-linecap="round"/></svg>
          Please enter an amount greater than $0
        </p>
      </div>

      <!-- Description -->
      <div class="mb-5">
        <label for="description" class="block text-sm font-medium text-slate-700 mb-1.5">
          Description <span class="text-rose-500" aria-hidden="true">*</span>
        </label>
        <input
          id="description"
          type="text"
          name="description"
          placeholder="What was this for?"
          maxlength="80"
          autocomplete="off"
          required
          aria-required="true"
          aria-describedby="description-error"
          class="field-input w-full h-11 px-4 text-base text-slate-800 bg-white border border-slate-300 rounded-xl placeholder-slate-400 transition-all duration-150"
        >
        <p id="description-error" class="hidden mt-1 text-xs text-rose-600 flex items-center gap-1" role="alert" aria-live="polite">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><circle cx="6" cy="6" r="5" stroke="#f43f5e" stroke-width="1.5"/><path d="M6 3.5V6.5M6 8h.01" stroke="#f43f5e" stroke-width="1.5" stroke-linecap="round"/></svg>
          Please describe this expense
        </p>
      </div>

      <!-- Who paid -->
      <div class="mb-5">
        <label for="paid-by" class="block text-sm font-medium text-slate-700 mb-1.5">Who paid?</label>
        <select
          id="paid-by"
          name="paid-by"
          class="custom-select field-input w-full h-11 px-4 text-base text-slate-800 bg-white border border-slate-300 rounded-xl transition-all duration-150 cursor-pointer"
          aria-label="Select who paid for this expense"
        >
          <option value="maya" selected>Maya (you)</option>
          <option value="jake">Jake</option>
          <option value="tom">Tom</option>
          <option value="sarah">Sarah</option>
          <option value="alex">Alex</option>
        </select>
      </div>

      <!-- Split mode -->
      <div class="mb-5">
        <p class="block text-sm font-medium text-slate-700 mb-2" id="split-label">Split between</p>
        <div class="space-y-2" role="radiogroup" aria-labelledby="split-label">

          <!-- Equal split -->
          <div>
            <input type="radio" id="split-equal" name="split-mode" value="equal" class="split-radio sr-only" checked onchange="handleSplitChange('equal')">
            <label for="split-equal" class="flex items-center gap-3 px-4 py-3 bg-white border-2 border-brand-700 rounded-xl cursor-pointer transition-all duration-150 hover:bg-brand-50" style="background-color:#ecfdf5; border-color:#047857; color:#065f46;">
              <span class="radio-dot w-4 h-4 rounded-full border-2 flex items-center justify-center flex-shrink-0" style="background-color:#047857; border-color:#047857;" aria-hidden="true">
                <span class="w-1.5 h-1.5 rounded-full bg-white"></span>
              </span>
              <div>
                <p class="text-sm font-semibold">Split equally</p>
                <p class="text-xs text-brand-700/70">Everyone pays the same share</p>
              </div>
            </label>
          </div>

          <!-- Custom amounts -->
          <div>
            <input type="radio" id="split-custom-amt" name="split-mode" value="custom-amounts" class="split-radio sr-only" onchange="handleSplitChange('custom-amounts')">
            <label for="split-custom-amt" class="flex items-center gap-3 px-4 py-3 bg-white border-2 border-slate-200 rounded-xl cursor-pointer transition-all duration-150 hover:bg-slate-50">
              <span class="radio-dot w-4 h-4 rounded-full border-2 border-slate-300 flex items-center justify-center flex-shrink-0" aria-hidden="true"></span>
              <div>
                <p class="text-sm font-semibold text-slate-700">Custom amounts</p>
                <p class="text-xs text-slate-400">Enter a specific dollar amount per person</p>
              </div>
            </label>
          </div>

          <!-- Custom percentages -->
          <div>
            <input type="radio" id="split-custom-pct" name="split-mode" value="custom-percentages" class="split-radio sr-only" onchange="handleSplitChange('custom-percentages')">
            <label for="split-custom-pct" class="flex items-center gap-3 px-4 py-3 bg-white border-2 border-slate-200 rounded-xl cursor-pointer transition-all duration-150 hover:bg-slate-50">
              <span class="radio-dot w-4 h-4 rounded-full border-2 border-slate-300 flex items-center justify-center flex-shrink-0" aria-hidden="true"></span>
              <div>
                <p class="text-sm font-semibold text-slate-700">Custom percentages</p>
                <p class="text-xs text-slate-400">Enter a percentage of the total per person</p>
              </div>
            </label>
          </div>

        </div>
      </div>

      <!-- Custom split sub-form (hidden by default) -->
      <div id="custom-split-form" class="hidden mb-5">
        <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">
          <div id="custom-split-rows" class="divide-y divide-slate-100">
            <!-- Dynamically generated by JS -->
          </div>
          <div id="custom-split-total" class="px-4 py-3 bg-slate-50 flex items-center justify-between">
            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Remaining</span>
            <span id="remaining-display" class="text-sm font-semibold text-brand-700 tabular-nums">$0.00</span>
          </div>
          <p id="custom-split-error" class="hidden px-4 pb-3 text-xs text-rose-600" role="alert" aria-live="polite">Amounts must add up to the total</p>
        </div>
      </div>

      <!-- Split preview (shown when amount > 0 and equal split) -->
      <div id="split-preview" class="mb-5 hidden">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Split preview</p>
        <div class="bg-white border border-slate-100 rounded-xl overflow-hidden shadow-sm">
          <div id="preview-rows" class="divide-y divide-slate-100">
            <!-- Filled by JS -->
          </div>
        </div>
      </div>

    </form>

  </main>

  <!-- Sticky CTA bar -->
  <div class="sticky-cta fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-4 py-3 z-40">
    <div class="max-w-lg mx-auto">
      <button
        id="submit-btn"
        type="button"
        onclick="handleSubmit(new Event('submit'))"
        class="w-full h-12 bg-brand-700 text-white font-semibold text-base rounded-xl flex items-center justify-center gap-2 hover:bg-brand-800 active:scale-[0.98] transition-all duration-150 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-500 focus-visible:ring-offset-2 disabled:opacity-40 disabled:pointer-events-none"
        aria-label="Save this expense"
      >
        <svg id="submit-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M3 9l4 4 8-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="submit-label">Add Expense</span>
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white text-sm font-medium px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 max-w-sm w-[calc(100%-2rem)]" role="status" aria-live="polite">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 8l3 3 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span id="toast-msg"></span>
  </div>

  <script>
    const MEMBERS = [
      { id: 'maya',  name: 'Maya (you)', initials: 'M', color: 'bg-emerald-100 text-emerald-800' },
      { id: 'jake',  name: 'Jake',        initials: 'J', color: 'bg-blue-100 text-blue-800' },
      { id: 'tom',   name: 'Tom',         initials: 'T', color: 'bg-amber-100 text-amber-800' },
      { id: 'sarah', name: 'Sarah',       initials: 'S', color: 'bg-pink-100 text-pink-800' },
      { id: 'alex',  name: 'Alex',        initials: 'A', color: 'bg-violet-100 text-violet-800' },
    ];

    let currentSplitMode = 'equal';
    let currentAmount = 0;

    // --- Amount handling ---
    function handleAmountChange(input) {
      const raw = input.value.replace(/[^0-9.]/g, '');
      // Prevent multiple decimals
      const parts = raw.split('.');
      if (parts.length > 2) input.value = parts[0] + '.' + parts.slice(1).join('');
      currentAmount = parseFloat(input.value) || 0;
      clearFieldError('amount-input', 'amount-error');
      updateSplitPreview();
      updateCustomSplitRows();
    }

    // --- Split mode ---
    function handleSplitChange(mode) {
      currentSplitMode = mode;
      const customForm = document.getElementById('custom-split-form');
      const preview = document.getElementById('split-preview');

      // Style all radio labels
      MEMBERS.forEach(() => {});
      document.querySelectorAll('input[name="split-mode"]').forEach(radio => {
        const label = radio.nextElementSibling;
        const dot = label.querySelector('.radio-dot');
        if (radio.checked) {
          label.style.backgroundColor = '#ecfdf5';
          label.style.borderColor = '#047857';
          label.style.color = '#065f46';
          dot.style.backgroundColor = '#047857';
          dot.style.borderColor = '#047857';
          dot.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-white"></span>';
        } else {
          label.style.backgroundColor = '';
          label.style.borderColor = '#e2e8f0';
          label.style.color = '';
          dot.style.backgroundColor = '';
          dot.style.borderColor = '#cbd5e1';
          dot.innerHTML = '';
        }
      });

      if (mode === 'equal') {
        customForm.classList.add('hidden');
        updateSplitPreview();
      } else {
        customForm.classList.remove('hidden');
        preview.classList.add('hidden');
        updateCustomSplitRows();
      }
    }

    // --- Split preview (equal mode) ---
    function updateSplitPreview() {
      const preview = document.getElementById('split-preview');
      const previewRows = document.getElementById('preview-rows');
      if (currentAmount <= 0 || currentSplitMode !== 'equal') {
        preview.classList.add('hidden');
        return;
      }
      preview.classList.remove('hidden');
      const perPerson = (currentAmount / MEMBERS.length).toFixed(2);
      previewRows.innerHTML = MEMBERS.map(m => `
        <div class="flex items-center gap-3 px-4 py-2.5">
          <div class="w-7 h-7 rounded-full ${m.color} font-semibold text-xs flex items-center justify-center flex-shrink-0">${m.initials}</div>
          <span class="flex-1 text-sm text-slate-700">${m.name}</span>
          <span class="text-sm font-semibold text-slate-800 tabular-nums">$${perPerson}</span>
        </div>
      `).join('');
    }

    // --- Custom split rows ---
    function updateCustomSplitRows() {
      if (currentSplitMode === 'equal') return;
      const container = document.getElementById('custom-split-rows');
      const isPercent = currentSplitMode === 'custom-percentages';
      const placeholder = isPercent ? '20' : (currentAmount / MEMBERS.length).toFixed(2);
      const unit = isPercent ? '%' : '$';

      container.innerHTML = MEMBERS.map((m, i) => `
        <div class="flex items-center gap-3 px-4 py-3">
          <div class="w-7 h-7 rounded-full ${m.color} font-semibold text-xs flex items-center justify-center flex-shrink-0">${m.initials}</div>
          <span class="flex-1 text-sm text-slate-700 truncate">${m.name}</span>
          <div class="flex items-center gap-1 w-28">
            ${!isPercent ? '<span class="text-sm text-slate-400 font-medium">$</span>' : ''}
            <input
              type="text"
              inputmode="decimal"
              placeholder="${placeholder}"
              data-member="${m.id}"
              class="w-full h-9 px-2 text-sm text-right font-semibold tabular-nums text-slate-800 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-brand-700 focus:ring-1 focus:ring-brand-500/25 transition-all"
              oninput="updateRemaining()"
              aria-label="${m.name} ${isPercent ? 'percentage' : 'amount'}"
            >
            ${isPercent ? '<span class="text-sm text-slate-400 font-medium">%</span>' : ''}
          </div>
        </div>
      `).join('');

      updateRemaining();
    }

    function updateRemaining() {
      const isPercent = currentSplitMode === 'custom-percentages';
      const inputs = document.querySelectorAll('#custom-split-rows input');
      let total = 0;
      inputs.forEach(inp => { total += parseFloat(inp.value) || 0; });
      const target = isPercent ? 100 : currentAmount;
      const remaining = target - total;
      const display = document.getElementById('remaining-display');
      const errEl = document.getElementById('custom-split-error');

      display.textContent = isPercent ? `${remaining.toFixed(1)}%` : `$${Math.abs(remaining).toFixed(2)}`;
      if (Math.abs(remaining) < 0.01) {
        display.classList.remove('text-brand-700', 'text-rose-600');
        display.classList.add('text-brand-700');
        display.textContent = isPercent ? '0%' : '$0.00';
        errEl.classList.add('hidden');
      } else if (remaining < 0) {
        display.classList.add('text-rose-600');
        display.classList.remove('text-brand-700');
        errEl.classList.remove('hidden');
        errEl.textContent = isPercent ? `Over by ${Math.abs(remaining).toFixed(1)}% — reduce some amounts` : `Over by $${Math.abs(remaining).toFixed(2)} — reduce some amounts`;
      } else {
        display.classList.remove('text-rose-600');
        display.classList.add('text-brand-700');
        errEl.classList.add('hidden');
      }
    }

    // --- Form validation + submit ---
    function handleSubmit(e) {
      if (e && e.preventDefault) e.preventDefault();
      let valid = true;

      const amount = parseFloat(document.getElementById('amount-input').value) || 0;
      const description = document.getElementById('description').value.trim();

      if (amount <= 0) {
        showFieldError('amount-input', 'amount-error');
        valid = false;
      }
      if (!description) {
        showFieldError('description', 'description-error');
        valid = false;
      }

      // Custom split validation
      if (currentSplitMode !== 'equal' && currentAmount > 0) {
        const inputs = document.querySelectorAll('#custom-split-rows input');
        let total = 0;
        inputs.forEach(inp => { total += parseFloat(inp.value) || 0; });
        const target = currentSplitMode === 'custom-percentages' ? 100 : currentAmount;
        if (Math.abs(total - target) > 0.01) {
          document.getElementById('custom-split-error').classList.remove('hidden');
          valid = false;
        }
      }

      if (!valid) return;

      // Loading state
      const btn = document.getElementById('submit-btn');
      const icon = document.getElementById('submit-icon');
      const label = document.getElementById('submit-label');
      btn.disabled = true;
      btn.setAttribute('aria-busy', 'true');
      icon.innerHTML = `<svg class="animate-spin" width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="rgba(255,255,255,0.3)" stroke-width="2"/><path d="M9 2a7 7 0 017 7" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`;
      label.textContent = 'Saving...';

      // Simulate API call
      setTimeout(() => {
        sessionStorage.setItem('expenseAdded', 'true');
        window.location.href = './dashboard.html';
      }, 900);
    }

    function showFieldError(inputId, errorId) {
      const input = document.getElementById(inputId);
      const err = document.getElementById(errorId);
      if (input) {
        input.classList.add('error');
        input.setAttribute('aria-invalid', 'true');
        input.classList.remove('shake');
        void input.offsetWidth;
        input.classList.add('shake');
      }
      if (err) err.classList.remove('hidden');
    }

    function clearFieldError(inputId, errorId) {
      const input = document.getElementById(inputId);
      const err = document.getElementById(errorId);
      if (input) { input.classList.remove('error', 'shake'); input.removeAttribute('aria-invalid'); }
      if (err) err.classList.add('hidden');
    }

    // Clear on input
    document.getElementById('description').addEventListener('input', () => clearFieldError('description', 'description-error'));

    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3500);
    }

    // Draft persistence
    window.addEventListener('DOMContentLoaded', () => {
      const draft = sessionStorage.getItem('expenseDraft');
      if (draft) {
        try {
          const d = JSON.parse(draft);
          if (d.amount) document.getElementById('amount-input').value = d.amount;
          if (d.description) document.getElementById('description').value = d.description;
        } catch(e) {}
      }
    });

    window.addEventListener('beforeunload', () => {
      const amount = document.getElementById('amount-input').value;
      const desc = document.getElementById('description').value;
      if (amount || desc) {
        sessionStorage.setItem('expenseDraft', JSON.stringify({ amount, description: desc }));
      }
    });
  </script>
</body>
</html>
