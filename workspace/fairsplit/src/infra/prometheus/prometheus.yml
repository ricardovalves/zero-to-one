global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: fairsplit
    environment: local

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: fairsplit-backend
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - backend:8000
        labels:
          service: backend
          app: fairsplit
