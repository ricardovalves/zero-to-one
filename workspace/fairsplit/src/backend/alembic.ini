# Alembic configuration file for FairSplit.
#
# DATABASE_URL is loaded from the environment variable at runtime in env.py.
# Do NOT set sqlalchemy.url here — it will be overridden.

[alembic]
# Path to migration scripts
script_location = migrations

# Template for new migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Max length of slug in migration filename
truncate_slug_length = 40

# Output encoding
output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
