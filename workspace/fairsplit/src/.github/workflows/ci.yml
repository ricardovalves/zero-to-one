name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend lint ──────────────────────────────────────────────────────────
  lint-backend:
    name: Lint — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: ruff check (lint)
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

  # ── Frontend lint ─────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint — Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ── Backend tests ─────────────────────────────────────────────────────────
  test-backend:
    name: Test — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fairsplit
          POSTGRES_PASSWORD: fairsplit_test
          POSTGRES_DB: fairsplit_test
        options: >-
          --health-cmd "pg_isready -U fairsplit -d fairsplit_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql+asyncpg://fairsplit:fairsplit_test@localhost:5432/fairsplit_test
      SECRET_KEY: ci-test-secret-key-minimum-32-characters-long
      ENVIRONMENT: test
      CORS_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Alembic migrations against test DB
        run: alembic upgrade head

      - name: Run unit + integration tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

      - name: Post coverage summary to PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: backend/coverage.xml
          title: Backend Test Coverage
          badge-title: Coverage
          hide-badge: false
          hide-report: false

  # ── Docker build validation ───────────────────────────────────────────────
  build-docker:
    name: Build — Docker Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: fairsplit-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: fairsplit-frontend:ci-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
            NEXT_PUBLIC_SHOW_DEV_PANEL=false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security scanning ─────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    # Run in parallel with lint and test — no dependency
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Backend dependency audit
        working-directory: backend
        run: |
          pip install -r requirements.txt --quiet
          pip-audit --strict

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend dependency audit
        working-directory: frontend
        run: |
          npm ci --quiet
          npm audit --audit-level=high

      - name: Build backend image for Trivy scan
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: fairsplit-backend:trivy-scan
          cache-from: type=gha

      - name: Trivy container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fairsplit-backend:trivy-scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
