name: CD

on:
  push:
    branches:
      - main

# Only one deployment at a time — never queue two deploys to production
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── CI gate (inline — fast re-check before any deploy artifact touches prod)
  ci-checks:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  # ── Build and push Docker images to GHCR ─────────────────────────────────
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: ci-checks
    permissions:
      contents: read
      packages: write

    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      image-tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.PRODUCTION_API_URL }}
            NEXT_PUBLIC_SHOW_DEV_PANEL=false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Run database migrations ───────────────────────────────────────────────
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      # Fly.io migration via SSH console
      - name: Install Fly CLI
        if: ${{ vars.DEPLOY_TARGET == 'fly' || vars.DEPLOY_TARGET == '' }}
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run Alembic migrations (Fly.io)
        if: ${{ vars.DEPLOY_TARGET == 'fly' || vars.DEPLOY_TARGET == '' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl ssh console \
            --app fairsplit-backend \
            --command "alembic upgrade head" \
            --wait-timeout 60

  # ── Deploy backend ────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: migrate
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Option A: Fly.io (default) ─────────────────────────────────────
      - name: Install Fly CLI
        if: ${{ vars.DEPLOY_TARGET == 'fly' || vars.DEPLOY_TARGET == '' }}
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend to Fly.io
        if: ${{ vars.DEPLOY_TARGET == 'fly' || vars.DEPLOY_TARGET == '' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --app fairsplit-backend \
            --image ghcr.io/${{ github.repository }}/backend:sha-${{ github.sha }} \
            --strategy rolling \
            --wait-timeout 120

      # ── Option B: Self-hosted VPS via SSH + Docker ─────────────────────
      - name: Deploy backend to VPS
        if: ${{ vars.DEPLOY_TARGET == 'vps' }}
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          IMAGE_TAG: sha-${{ github.sha }}
          GHCR_REPO: ghcr.io/${{ github.repository }}
        run: |
          eval "$(ssh-agent -s)"
          echo "$VPS_SSH_KEY" | ssh-add -
          ssh -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "docker pull $GHCR_REPO/backend:$IMAGE_TAG && \
             docker stop fairsplit-backend || true && \
             docker rm fairsplit-backend || true && \
             docker run -d \
               --name fairsplit-backend \
               --restart unless-stopped \
               --env-file /opt/fairsplit/.env \
               -p 8000:8000 \
               $GHCR_REPO/backend:$IMAGE_TAG"

  # ── Deploy frontend ───────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Option A: Vercel (default) ─────────────────────────────────────
      - name: Deploy frontend to Vercel
        if: ${{ vars.DEPLOY_TARGET == 'vercel' || vars.DEPLOY_TARGET == '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: frontend
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      # ── Option B: Fly.io ───────────────────────────────────────────────
      - name: Install Fly CLI
        if: ${{ vars.DEPLOY_TARGET == 'fly' }}
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy frontend to Fly.io
        if: ${{ vars.DEPLOY_TARGET == 'fly' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --app fairsplit-frontend \
            --image ghcr.io/${{ github.repository }}/frontend:sha-${{ github.sha }} \
            --strategy rolling \
            --wait-timeout 120

  # ── Post-deploy smoke test ────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
      - deploy-frontend
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke test dependencies
        run: pip install httpx pytest pytest-asyncio

      - name: Wait for backend to be healthy
        env:
          BACKEND_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health")
            if [ "$status" = "200" ]; then
              echo "Backend is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$status — waiting 10s..."
            sleep 10
          done
          echo "Backend health check failed after 120s"
          exit 1

      - name: Run smoke tests
        env:
          BACKEND_URL: ${{ secrets.PRODUCTION_API_URL }}
          FRONTEND_URL: ${{ secrets.PRODUCTION_FRONTEND_URL }}
        run: python smoke_test.py

  # ── Rollback on failure ───────────────────────────────────────────────────
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs:
      - smoke-test
    if: failure()
    environment: production

    steps:
      - name: Install Fly CLI
        if: ${{ vars.DEPLOY_TARGET == 'fly' || vars.DEPLOY_TARGET == '' }}
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Rollback backend (Fly.io)
        if: ${{ vars.DEPLOY_TARGET == 'fly' || vars.DEPLOY_TARGET == '' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl releases rollback --app fairsplit-backend

      - name: Rollback frontend (Fly.io)
        if: ${{ vars.DEPLOY_TARGET == 'fly' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl releases rollback --app fairsplit-frontend

      - name: Notify rollback
        run: |
          echo "DEPLOYMENT ROLLED BACK"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Reason: smoke test failure"
